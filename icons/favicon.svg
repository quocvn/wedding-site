<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <!-- Gold gradient -->
    <linearGradient id="gold" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" />
      <stop offset="100%" stop-color="#ffffff" />
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="100" height="100" rx="22" fill="#e85c5c" />

  <!-- Calligraphy letters -->
  <text x="50%" y="55%" text-anchor="middle" dominant-baseline="middle" font-family="'Great Vibes', 'Allura', cursive"
    font-size="46" fill="url(#gold)">
    QH
  </text>

  <!-- Interlocking rings -->
  <circle cx="40" cy="35" r="10" fill="none" stroke="url(#gold)" stroke-width="2" />
  <circle cx="55" cy="35" r="10" fill="none" stroke="url(#gold)" stroke-width="2" />

  <!-- Small diamond -->
  <polygon points="52,22 55,28 52,30 49,28" fill="#ffffff" stroke="url(#gold)" stroke-width="1" />
</svg>